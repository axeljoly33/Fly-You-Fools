title = "FYF - Flight Mod";
description = "
FYF (Fly You Fools - a Lord of the Rings reference) - Flight Mod.
This mod is actually in Beta phase. Do not hesitate to address me the problems you get via Discord (Uganda#4769) or comment them in the comment section in the Steam Workshop.
DISCLAIMER: You have to disable any other Flight mode to make this one working and not buggy.
Known bugs:
- Collision model with walls and ground.\n
It is a First person flight mod. Click on the row to set-up a keybind. It features:
- 1st person view flight mode.
- User FoV.
- 6 DoF camera and movement.
- Possibility to change flying speed via mousescroll.
- Automatically detect your keyboard layout. Takes in account: Forward, Backward, Right, Left keys for basic movements. Space and crouch are used for going up and down while in flight.
- Adjustable and optional UI widget displaying flight informations.
- Minimum and maximum flight speeds adjustable from 0 to 200. Step is also adjustable.
- Hide/Unhide UI (WIP), your arms and/or your weapon. It is useful if you want to act like a camera for taking photos or making nice videos. You can hide crosshair in Options -> Gameplay -> Interface -> Enabled Crosshairs = None.
";
